<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ジャンル設定</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: serif; height: 100dvh; display: flex; align-items: center; justify-content: center; }
        .box { border: 1px solid #333; padding: 40px; width: 340px; box-sizing: border-box; }
        h2 { font-size: 1rem; color: #888; margin-bottom: 8px; letter-spacing: 0.2em; }
        .desc { font-size: 0.75rem; color: #555; margin-bottom: 30px; line-height: 1.7; }
        label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 6px; margin-top: 20px; }
        input[type="text"] { width: 100%; background: #000; border: none; border-bottom: 1px solid #555; color: #fff; font-size: 1rem; padding: 8px 0; outline: none; box-sizing: border-box; font-family: serif; }
        .random-slot { margin-top: 20px; padding: 12px; border: 1px solid #333; color: #555; font-size: 0.8rem; text-align: center; }
        button { margin-top: 30px; width: 100%; background: #000; color: #00f2ff; border: 1px solid #00f2ff; padding: 10px; font-size: 0.9rem; cursor: pointer; letter-spacing: 0.1em; font-family: serif; }
        button:hover { background: rgba(0,242,255,0.1); }
        .back { margin-top: 15px; text-align: center; font-size: 0.75rem; }
        .back a { color: #555; text-decoration: none; }
        .back a:hover { color: #fff; }
        #menu-btn { position: fixed; top: 16px; left: 16px; font-size: 1.5rem; cursor: pointer; color: #fff; }
    </style>
</head>
<body>
    <div id="menu-btn" onclick="window.location.href='/'">☰</div>
    <div class="box">
        <h2>ジャンル設定</h2>
        <div class="desc">
            2つのキーワードを設定すると、そのキーワードを含む記事が優先表示されます。<br>
            残り1枠はランダムです。
        </div>
        <form method="POST" action="/genre">
            <label>キーワード 1</label>
            <input type="text" name="genre1" value="{{ genre1 }}" placeholder="例：経済、スポーツ、AI">
            <label>キーワード 2</label>
            <input type="text" name="genre2" value="{{ genre2 }}" placeholder="例：政治、テクノロジー">
            <div class="random-slot">🎲 ランダム（自動）</div>
            <button type="submit">保存する</button>
        </form>
        <div class="back"><a href="/">← RANDOMに戻る</a></div>
    </div>
</body>
</html>

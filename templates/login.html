<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: serif; height: 100dvh; display: flex; align-items: center; justify-content: center; }
        .box { border: 1px solid #333; padding: 40px; width: 320px; box-sizing: border-box; }
        h2 { font-size: 1rem; color: #888; margin-bottom: 30px; letter-spacing: 0.2em; }
        input[type="email"] { width: 100%; background: #000; border: none; border-bottom: 1px solid #555; color: #fff; font-size: 1rem; padding: 10px 0; outline: none; box-sizing: border-box; }
        button { margin-top: 30px; width: 100%; background: #000; color: #00f2ff; border: 1px solid #00f2ff; padding: 10px; font-size: 0.9rem; cursor: pointer; letter-spacing: 0.1em; }
        button:hover { background: rgba(0,242,255,0.1); }
        .error { color: #ff4444; font-size: 0.8rem; margin-top: 15px; }
    </style>
</head>
<body>
    <div onclick="window.location.href='/'" style="position:fixed;top:16px;left:16px;color:#fff;font-size:1.5rem;cursor:pointer;z-index:999;">☰</div>
    <div class="box">
        <h2>LOGIN</h2>
        <form method="POST" action="/login?next={{ next }}">
            <input type="email" name="email" placeholder="メールアドレス" required autofocus>
            <button type="submit">コードを送信</button>
            {% if error %}<div class="error">{{ error }}</div>{% endif %}
        </form>
    </div>
</body>
</html>

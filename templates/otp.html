<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コード確認</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: serif; height: 100dvh; display: flex; align-items: center; justify-content: center; }
        .box { border: 1px solid #333; padding: 40px; width: 320px; box-sizing: border-box; }
        h2 { font-size: 1rem; color: #888; margin-bottom: 10px; letter-spacing: 0.2em; }
        .email { font-size: 0.8rem; color: #555; margin-bottom: 30px; }
        input[type="text"] { width: 100%; background: #000; border: none; border-bottom: 1px solid #555; color: #fff; font-size: 1.5rem; padding: 10px 0; outline: none; box-sizing: border-box; letter-spacing: 0.3em; text-align: center; }
        button { margin-top: 30px; width: 100%; background: #000; color: #00f2ff; border: 1px solid #00f2ff; padding: 10px; font-size: 0.9rem; cursor: pointer; letter-spacing: 0.1em; }
        button:hover { background: rgba(0,242,255,0.1); }
        .error { color: #ff4444; font-size: 0.8rem; margin-top: 15px; }
        .back { margin-top: 20px; text-align: center; font-size: 0.75rem; color: #555; cursor: pointer; }
        .back a { color: #555; text-decoration: none; }
    </style>
</head>
<body>
    <div class="box">
        <h2>VERIFY</h2>
        <div class="email">{{ email }} に送信しました</div>
        <form method="POST" action="/otp">
            <input type="text" name="code" placeholder="000000" maxlength="6" required autofocus inputmode="numeric">
            <button type="submit">確認</button>
            {% if error %}<div class="error">{{ error }}</div>{% endif %}
        </form>
        <div class="back"><a href="/login">← メールアドレスを変更</a></div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規登録</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: serif; height: 100dvh; display: flex; align-items: center; justify-content: center; }
        #side-menu { position: fixed; left: -260px; width: 250px; height: 100%; background: #111; z-index: 300; transition: 0.3s; padding-top: 60px; }
        #side-menu a { display: block; padding: 20px; color: #fff; text-decoration: none; border-bottom: 1px solid #222; transition: background 0.2s, color 0.2s; }
        #side-menu a:hover { background: rgba(255,255,255,0.05); color: #00f2ff; }
        #overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:250; }
        #menu-btn { position: fixed; top: 16px; left: 16px; font-size: 1.5rem; cursor: pointer; z-index: 999; }
        .box { border: 1px solid #333; padding: 40px; width: 320px; box-sizing: border-box; }
        h2 { font-size: 1rem; color: #888; margin-bottom: 8px; letter-spacing: 0.2em; }
        .desc { font-size: 0.75rem; color: #555; margin-bottom: 24px; line-height: 1.7; }
        input { width: 100%; background: #000; border: none; border-bottom: 1px solid #555; color: #fff; font-size: 1rem; padding: 10px 0; outline: none; box-sizing: border-box; font-family: serif; margin-bottom: 16px; }
        button { margin-top: 8px; width: 100%; background: #000; color: #00f2ff; border: 1px solid #00f2ff; padding: 10px; font-size: 0.9rem; cursor: pointer; letter-spacing: 0.1em; font-family: serif; }
        button:hover { background: rgba(0,242,255,0.1); }
        .error { color: #ff4444; font-size: 0.8rem; margin-top: 15px; }
        .sub { margin-top: 16px; text-align: center; font-size: 0.75rem; }
        .sub a { color: #555; text-decoration: none; }
        .sub a:hover { color: #fff; }
    </style>
</head>
<body>
    <div id="menu-btn" onclick="toggleMenu()">☰</div>
    <div id="overlay" onclick="closeMenu()"></div>
    <div id="side-menu">
        <a href="/home">ホーム</a>
        <a href="/login">ログイン</a>
        <a href="/register" style="color:#00f2ff;">新規登録</a>
    </div>

    <div class="box">
        <h2>新規登録</h2>
        <div class="desc">メールアドレスとパスワードを設定してください。<br>確認コードをメールに送信します。</div>
        <form method="POST" action="/register">
            <input type="email" name="email" value="{{ email }}" placeholder="メールアドレス" required autofocus>
            <input type="password" name="password" placeholder="パスワード（6文字以上）" required>
            <input type="password" name="password2" placeholder="パスワード（確認）" required>
            <button type="submit">確認コードを送る</button>
            {% if error %}<div class="error">{{ error }}</div>{% endif %}
        </form>
        <div class="sub"><a href="/login">← ログインはこちら</a></div>
    </div>

    <script>
        function toggleMenu() {
            const m = document.getElementById('side-menu');
            const o = document.getElementById('overlay');
            if (m.style.left === '0px') { m.style.left = '-260px'; o.style.display = 'none'; }
            else { m.style.left = '0px'; o.style.display = 'block'; }
        }
        function closeMenu() {
            document.getElementById('side-menu').style.left = '-260px';
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>

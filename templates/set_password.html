<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワード設定</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: serif; height: 100dvh; display: flex; align-items: center; justify-content: center; }
        .box { border: 1px solid #333; padding: 40px; width: 320px; box-sizing: border-box; }
        h2 { font-size: 1rem; color: #888; margin-bottom: 30px; letter-spacing: 0.2em; }
        input { width: 100%; background: #000; border: none; border-bottom: 1px solid #555; color: #fff; font-size: 1rem; padding: 10px 0; outline: none; box-sizing: border-box; font-family: serif; margin-bottom: 16px; }
        button { margin-top: 14px; width: 100%; background: #000; color: #00f2ff; border: 1px solid #00f2ff; padding: 10px; font-size: 0.9rem; cursor: pointer; font-family: serif; }
        button:hover { background: rgba(0,242,255,0.1); }
        .error { color: #ff4444; font-size: 0.8rem; margin-top: 15px; }
        .success { color: #00ff88; font-size: 0.8rem; margin-top: 15px; }
        .back { margin-top: 20px; text-align: center; font-size: 0.75rem; }
        .back a { color: #555; text-decoration: none; }
        #menu-btn { position: fixed; top: 16px; left: 16px; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>
    <div id="menu-btn" onclick="window.location.href='/'">☰</div>
    <div class="box">
        <h2>パスワード設定</h2>
        <form method="POST">
            <input type="password" name="password" placeholder="新しいパスワード（6文字以上）" required>
            <input type="password" name="password2" placeholder="パスワード（確認）" required>
            <button type="submit">設定する</button>
            {% if error %}<div class="error">{{ error }}</div>{% endif %}
            {% if success %}<div class="success">{{ success }}</div>{% endif %}
        </form>
        <div class="back"><a href="/">← 戻る</a></div>
    </div>
</body>
</html>
